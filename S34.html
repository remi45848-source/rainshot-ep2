<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Breaking</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: max(16px, 6vw);
      padding-right: 12px;
      font-family: ui-monospace, "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Courier New", monospace;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .push-block {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .line {
      opacity: 0;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .line.visible {
      opacity: 1;
    }

    .line.spacer {
      height: 0.7em;
    }

    .cursor-blink {
      display: inline;
      animation: blink 1s step-end infinite;
      color: #ffffff;
      font-size: 13px;
      font-weight: 400;
    }

    @keyframes blink {
      0%, 49.9% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="push-block">
    <div class="line" data-delay="0" style="color:#cc0000; font-size:13px; letter-spacing:3px;">BREAKING</div>
    <div class="line spacer" data-delay="1000"></div>
    <div class="line" data-delay="1800" style="color:#ffffff; font-size:22px; font-weight:400;">Son of former president</div>
    <div class="line" data-delay="2600" style="color:#ffffff; font-size:22px; font-weight:700;">Reynaldo Acosta</div>
    <div class="line spacer" data-delay="3400"></div>
    <div class="line" data-delay="4200" style="color:#ffffff; font-size:16px;">and his female companion</div>
    <div class="line spacer" data-delay="5000"></div>
    <div class="line" data-delay="5800" style="color:#ffffff; font-size:16px;">in the 21st-floor suite of the Grand Hyatt</div>
    <div class="line" data-delay="6600" style="color:#ffffff; font-size:16px;">found dead</div>
    <div class="line" data-delay="8400" style="color:#888888; font-size:13px;">Since the Dalton incident</div>
    <div class="line" data-delay="10000" style="color:#888888; font-size:13px;">less than thirty-two hours</div>
    <div class="line" data-delay="12600" style="color:#ffffff; font-size:13px;">The killer at the scene</div>
    <div class="line" data-delay="13400" style="color:#ffffff; font-size:13px;">left a single note</div>
    <div class="line" data-delay="15200" style="color:#ffffff; font-size:13px;">Contents partially leaked&#8202;—<span class="cursor-blink" style="display:none;">|</span></div>
  </div>

  <script>
    (function () {
      var lines = document.querySelectorAll('.line');
      var started = false;

      function runSequence() {
        if (started) return;
        started = true;
        for (var i = 0; i < lines.length; i++) {
          (function (line) {
            var delay = parseInt(line.getAttribute('data-delay'), 10);
            if (isNaN(delay)) delay = 0;
            setTimeout(function () {
              line.classList.add('visible');
              var cursor = line.querySelector('.cursor-blink');
              if (cursor) cursor.style.display = 'inline';
            }, delay);
          })(lines[i]);
        }
      }

      /* 在父页里预隐藏 iframe 时 iOS 会节流定时器；等真正进入视口再开始逐行 */
      function arm() {
        if (typeof IntersectionObserver !== 'undefined') {
          var obs = new IntersectionObserver(
            function (entries) {
              for (var j = 0; j < entries.length; j++) {
                if (entries[j].isIntersecting) {
                  obs.disconnect();
                  runSequence();
                  return;
                }
              }
            },
            { root: null, threshold: 0.05 }
          );
          obs.observe(document.body);
        } else {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', runSequence);
          } else {
            runSequence();
          }
        }
        setTimeout(function () {
          if (!started) runSequence();
        }, 1200);
      }
      arm();
    })();
  </script>
</body>
</html>
